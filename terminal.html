<!doctype html>
<!--
  Unified Terminal — shell with Bloomberg-style tabs.
  Every click on a SEC filing, press release, news article, etc. opens a
  new tab INSIDE this terminal. Nothing escapes to Chrome.
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#000; --panel:#0b0b0b; --line:#1d1d1d; --text:#ffffff;
  --muted:#e8e8e8; --dim:#b8b8b8; --orange:#ff8c00; --amber:#ffb000;
  --green:#00d68f; --red:#ff3b30; --blue:#4ea1ff;
  --mono:'JetBrains Mono','SF Mono','Menlo','Consolas',monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;height:100vh;width:100vw;background:#000;color:var(--text);font-family:var(--mono);font-size:12px;overflow:hidden;}
.shell{display:grid;grid-template-rows:30px 1fr;height:100vh;width:100vw;}

/* ---------- top tab bar ---------- */
.tabs{display:flex;align-items:stretch;background:linear-gradient(180deg,#1a1206,#0a0703);border-bottom:1px solid #2a1a05;overflow-x:auto;overflow-y:hidden;}
.tabs::-webkit-scrollbar{height:4px;}
.tabs::-webkit-scrollbar-thumb{background:#333;}
.tab{display:flex;align-items:center;gap:6px;padding:0 10px;color:var(--muted);border-right:1px solid var(--line);cursor:pointer;font-size:11px;letter-spacing:1px;text-transform:uppercase;white-space:nowrap;max-width:240px;flex-shrink:0;user-select:none;}
.tab .ttl{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tab .x{color:var(--dim);width:14px;text-align:center;border-radius:2px;}
.tab .x:hover{background:#3a1a05;color:#fff;}
.tab.active{color:var(--amber);background:#120a02;box-shadow:inset 0 -2px 0 var(--orange);}
.tab:hover{color:var(--text);}
.tab .pin{color:var(--orange);font-size:9px;}
.tab.system .ttl{color:var(--orange);font-weight:600;}
.tabs-spacer{flex:1;}
.tabs-brand{display:flex;align-items:center;gap:6px;padding:0 12px;color:var(--orange);font-weight:700;letter-spacing:2px;border-right:1px solid #2a1a05;font-size:12px;}
.tabs-brand .dot{display:inline-block;width:8px;height:8px;background:var(--orange);box-shadow:0 0 8px var(--orange);}
.tabs-actions{display:flex;align-items:center;padding:0 8px;gap:6px;color:var(--muted);font-size:10px;}
.tabs-actions .new{color:var(--amber);cursor:pointer;padding:2px 8px;border:1px solid #2a1a05;}
.tabs-actions .new:hover{background:#1a1206;color:var(--orange);}

/* ---------- iframe stack ---------- */
.stack{position:relative;background:#000;}
.stack > iframe{position:absolute;inset:0;width:100%;height:100%;border:0;display:none;background:#000;}
.stack > iframe.active{display:block;}

/* loading shim */
.loading-shim{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.7);color:var(--orange);z-index:5;font-size:11px;letter-spacing:2px;}
.loading-shim.show{display:flex;}
</style>
</head>
<body>
<div class="shell">

  <div class="tabs" id="tabs">
    <div class="tabs-brand"><span class="dot"></span>TERMINAL</div>
    <!-- system tabs are prepended here at boot -->
    <div class="tabs-spacer"></div>
    <div class="tabs-actions">
      <span class="new" id="newGo" title="Go to URL (Ctrl/Cmd+L)">+ GO URL</span>
    </div>
  </div>

  <div class="stack" id="stack">
    <!-- iframes inserted dynamically -->
    <div class="loading-shim" id="shim">LOADING…</div>
  </div>

</div>

<script>
/*  ===========================================================
    Unified Terminal — tab manager
    -----------------------------------------------------------
    System tabs:
       markets   →  /markets.html       (Reuse-Pack UI)
       bitcoin   →  /bitcoin.html       (Bitcoin Intelligence)

    Dynamic tabs:
       Any child page can postMessage:
         { type:'unified-terminal:open-tab', url, title }
       and we open a new tab proxied through /api/proxy?url=...
    =========================================================== */

const SYSTEM_TABS = [
  { id:'markets',  title:'Markets',         src:'/markets.html',  pinned:true },
  { id:'calendar', title:'Watchlist Feed',  src:'/calendar.html', pinned:true },
  { id:'policy',   title:'Policy Watch',    src:'/policy.html',   pinned:true },
];

const state = { tabs: [], active: null };

const tabsEl  = document.getElementById('tabs');
const stackEl = document.getElementById('stack');
const shimEl  = document.getElementById('shim');
const brandEl = tabsEl.querySelector('.tabs-brand');
const spacerEl= tabsEl.querySelector('.tabs-spacer');

function _uid(){ return 't'+Math.random().toString(36).slice(2,9); }

function createTab({ title, src, pinned=false, system=false }){
  const id = _uid();
  // tab chip
  const chip = document.createElement('div');
  chip.className = 'tab' + (system?' system':'');
  chip.dataset.id = id;
  chip.innerHTML = (pinned?'<span class="pin">•</span>':'')
    + '<span class="ttl"></span>'
    + (pinned?'':'<span class="x" title="close">×</span>');
  chip.querySelector('.ttl').textContent = title;
  chip.addEventListener('click', (e)=>{
    if(e.target.classList.contains('x')){
      e.stopPropagation();
      closeTab(id);
    } else {
      activateTab(id);
    }
  });
  tabsEl.insertBefore(chip, spacerEl);

  // iframe
  const f = document.createElement('iframe');
  f.dataset.id = id;
  f.src = src;
  f.setAttribute('sandbox','allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox');
  // allow-same-origin only safe for our own pages; for proxied content we
  // still keep allow-same-origin because the server already rewrote it.
  stackEl.appendChild(f);

  state.tabs.push({ id, title, src, pinned, system, chip, frame:f });
  activateTab(id);
  return id;
}

function activateTab(id){
  state.active = id;
  for(const t of state.tabs){
    const on = t.id === id;
    t.chip.classList.toggle('active', on);
    t.frame.classList.toggle('active', on);
  }
}

function closeTab(id){
  const idx = state.tabs.findIndex(t=>t.id===id);
  if(idx < 0) return;
  const t = state.tabs[idx];
  if(t.pinned) return;
  t.chip.remove();
  t.frame.remove();
  state.tabs.splice(idx,1);
  if(state.active === id){
    const next = state.tabs[Math.max(0,idx-1)] || state.tabs[0];
    if(next) activateTab(next.id);
  }
}

function renameTab(id, title){
  const t = state.tabs.find(t=>t.id===id);
  if(!t) return;
  t.title = title;
  t.chip.querySelector('.ttl').textContent = title;
  t.chip.title = title;
}

function findTabBySrc(src){
  return state.tabs.find(t => t.src === src);
}

/* ---- URLs that won't render inside a sandboxed iframe ---- */
function _mustEscapeIframe(url){
  // Google's article URL serves its "Redirect Notice — invalid web
  // address" interstitial whenever it sees the request coming from a
  // non-interactive context (our server-side proxy). No cookies or
  // headers fix it - the only reliable path is to pop a real browser
  // tab so the redirect resolves naturally.
  try{
    const u = new URL(url, location.href);
    const h = (u.hostname || '').toLowerCase();
    if(h === 'news.google.com' || h.endsWith('.news.google.com')) return true;
    if(h === 'google.com' && u.pathname.startsWith('/url')) return true;
  }catch(_){}
  return false;
}

/* ---- open an arbitrary URL in a NEW tab via the proxy ---- */
function openExternalUrl(url, title){
  if(!url) return;
  if(_mustEscapeIframe(url)){
    try{ window.open(url, '_blank', 'noopener,noreferrer'); }catch(_){}
    return;
  }
  // de-dupe: if a tab with the same source already exists, just focus it.
  const proxied = '/api/proxy?url=' + encodeURIComponent(url);
  const existing = findTabBySrc(proxied);
  if(existing){ activateTab(existing.id); return existing.id; }
  // shorten title if needed
  let t = (title||'').trim();
  if(!t){
    try{ t = new URL(url).hostname.replace(/^www\./,''); }catch(_){ t = url; }
  }
  if(t.length > 32) t = t.slice(0,30) + '…';
  return createTab({ title: t, src: proxied });
}

/* ---- listen for child-frame requests ---- */
window.addEventListener('message', (e)=>{
  const d = e.data;
  if(!d || typeof d !== 'object') return;
  if(d.type === 'unified-terminal:open-tab' && d.url){
    openExternalUrl(d.url, d.title);
  } else if(d.type === 'unified-terminal:focus-tab' && d.tabId){
    const t = state.tabs.find(t => t.src && t.src.indexOf('/'+d.tabId+'.html') >= 0);
    if(t){
      activateTab(t.id);
      // If a symbol was requested, ask the child page to load it.
      if(d.symbol){
        try{ t.frame.contentWindow.postMessage(
          {type:'unified-terminal:load-symbol', symbol:d.symbol}, '*'); }catch(_){ }
        // Also stash in URL hash so a reload preserves it.
        try{ t.frame.src = t.src + '#' + d.symbol; }catch(_){ }
      }
    }
  }
});

/* ---- boot ---- */
for(const t of SYSTEM_TABS){
  createTab({ title:t.title, src:t.src, pinned:true, system:true });
}
activateTab(state.tabs[0].id);

/* ---- Ctrl/Cmd+L: open a URL ---- */
document.getElementById('newGo').addEventListener('click', ()=>{
  const u = prompt('Go to URL (will open in a new in-app tab):');
  if(u) openExternalUrl(u.startsWith('http')?u:('https://'+u));
});
document.addEventListener('keydown', (e)=>{
  if((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'l'){
    e.preventDefault();
    const u = prompt('Go to URL:');
    if(u) openExternalUrl(u.startsWith('http')?u:('https://'+u));
  }
  if((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'w'){
    e.preventDefault();
    if(state.active) closeTab(state.active);
  }
});
</script>
</body>
</html>
